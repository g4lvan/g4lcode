  <title>g4lcode — Editor</title>
  <link rel="icon" href="logo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
      --bg:#0d0e16; --surface:#13141e; --border:#252838;
      --accent:#a78bfa; --accent2:#34d399; --accent3:#fbbf24; --accent4:#f472b6;
      --accent-dim:rgba(167,139,250,.09); --accent-mid:rgba(167,139,250,.17); --accent-soft:rgba(167,139,250,.22);
      --text:#e8eaf8; --muted:#6572a0; --console-bg:#090a12;
      --statusbar-bg:#a78bfa; --statusbar-fg:#fff;
      --tab-h:42px; --bar-h:52px;
      --font-ui:'Syne',sans-serif; --font-code:'JetBrains Mono',monospace;
    }
    :root[data-theme="codeflow"] {
      --bg:#0d0e16; --surface:#13141e; --border:#252838;
      --accent:#a78bfa; --accent2:#34d399; --accent3:#fbbf24; --accent4:#f472b6;
      --accent-dim:rgba(167,139,250,.09); --accent-mid:rgba(167,139,250,.17); --accent-soft:rgba(167,139,250,.22);
      --text:#e8eaf8; --muted:#6572a0; --console-bg:#090a12;
      --statusbar-bg:#a78bfa; --statusbar-fg:#fff;
    }
    :root[data-theme="one-dark-pro"] {
      --bg: #21252b; --surface: #282c34; --border: #3e4451;
      --accent: #61afef; --accent2: #98c379; --accent3: #e5c07b; --accent4: #c678dd;
      --accent-dim: rgba(97,175,239,.08); --accent-mid: rgba(97,175,239,.15); --accent-soft: rgba(97,175,239,.2);
      --text: #abb2bf; --muted: #5c6370; --console-bg: #1a1d23;
      --statusbar-bg: #21252b; --statusbar-fg: #61afef;
    }
    :root[data-theme="dracula"]       { --bg:#1e1f29;--surface:#282a36;--border:#44475a;--accent:#bd93f9;--accent2:#50fa7b;--accent3:#f1fa8c;--accent4:#ff79c6;--accent-dim:rgba(189,147,249,.09);--accent-mid:rgba(189,147,249,.18);--accent-soft:rgba(189,147,249,.24);--text:#f8f8f2;--muted:#6272a4;--console-bg:#181920;--statusbar-bg:#bd93f9;--statusbar-fg:#282a36; }
    :root[data-theme="night-owl"]     { --bg:#011627;--surface:#021d2f;--border:#1d3b53;--accent:#82aaff;--accent2:#addb67;--accent3:#ffcb8b;--accent4:#c792ea;--accent-dim:rgba(130,170,255,.08);--accent-mid:rgba(130,170,255,.16);--accent-soft:rgba(130,170,255,.22);--text:#d6deeb;--muted:#5f7e97;--console-bg:#010e1a;--statusbar-bg:#082d47;--statusbar-fg:#82aaff; }
    :root[data-theme="solarized-dark"]{ --bg:#002b36;--surface:#073642;--border:#194551;--accent:#268bd2;--accent2:#859900;--accent3:#b58900;--accent4:#d33682;--accent-dim:rgba(38,139,210,.09);--accent-mid:rgba(38,139,210,.18);--accent-soft:rgba(38,139,210,.24);--text:#839496;--muted:#4a6872;--console-bg:#001e27;--statusbar-bg:#073642;--statusbar-fg:#268bd2; }
    :root[data-theme="github-dark"]   { --bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#58a6ff;--accent2:#3fb950;--accent3:#d29922;--accent4:#f47067;--accent-dim:rgba(88,166,255,.08);--accent-mid:rgba(88,166,255,.15);--accent-soft:rgba(88,166,255,.22);--text:#e6edf3;--muted:#484f58;--console-bg:#090d12;--statusbar-bg:#161b22;--statusbar-fg:#58a6ff; }
    :root[data-theme="monokai-pro"]   { --bg:#2d2a2e;--surface:#343135;--border:#4a464d;--accent:#ab9df2;--accent2:#a9dc76;--accent3:#ffd866;--accent4:#ff6188;--accent-dim:rgba(171,157,242,.09);--accent-mid:rgba(171,157,242,.17);--accent-soft:rgba(171,157,242,.24);--text:#fcfcfa;--muted:#727072;--console-bg:#221f22;--statusbar-bg:#ff6188;--statusbar-fg:#2d2a2e; }
    :root[data-theme="tokyo-night"]   { --bg:#1a1b26;--surface:#1f2335;--border:#292e42;--accent:#7aa2f7;--accent2:#9ece6a;--accent3:#e0af68;--accent4:#f7768e;--accent-dim:rgba(122,162,247,.08);--accent-mid:rgba(122,162,247,.16);--accent-soft:rgba(122,162,247,.22);--text:#c0caf5;--muted:#565f89;--console-bg:#13141f;--statusbar-bg:#7aa2f7;--statusbar-fg:#1a1b26; }
    :root[data-theme="catppuccin"]    { --bg:#1e1e2e;--surface:#181825;--border:#313244;--accent:#cba6f7;--accent2:#a6e3a1;--accent3:#f9e2af;--accent4:#f38ba8;--accent-dim:rgba(203,166,247,.08);--accent-mid:rgba(203,166,247,.16);--accent-soft:rgba(203,166,247,.22);--text:#cdd6f4;--muted:#6c7086;--console-bg:#11111b;--statusbar-bg:#cba6f7;--statusbar-fg:#1e1e2e; }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

    /* Smooth theme transitions */
    #topbar, #sidebar, #editor-tabs, #preview-topbar,
    #console-panel, #console-topbar, #statusbar,
    .lang-btn, .etab, .btn, #resizer {
      transition: background-color .25s ease, border-color .25s ease, color .25s ease;
    }

    /* ── TOP BAR ── */
    #topbar {
      height: var(--bar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; gap: 16px;
      position: relative; z-index: 10;
    }
    .logo {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; -webkit-text-fill-color: transparent;;
    }
    .logo span { -webkit-text-fill-color: var(--muted); font-weight: 400; font-size: 0.8rem; margin-left: 6px; }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-ui); font-size: 0.78rem; font-weight: 600;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; letter-spacing: 0.3px;
      transition: all .18s ease; display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #6a59e0; border-color: #6a59e0; color: #fff; }

    .indicator { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

    /* ── LAYOUT ── */
    #app-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--bar-h));
    }
    #layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── PROJECTS SIDEBAR ── */
    #projects-sidebar {
      width: 210px; background: var(--bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
      transition: background .25s, border-color .25s;
    }
    #projects-sidebar.collapsed { width: 0 !important; min-width: 0 !important; }
    #proj-resizer {
      width: 4px; background: transparent; cursor: col-resize; flex-shrink: 0;
      transition: background .15s; position: relative;
    }
    #proj-resizer:hover, #proj-resizer.dragging { background: var(--accent); }
    #proj-header {
      height: var(--tab-h); background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0;
    }
    #proj-header span { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); flex: 1; white-space: nowrap; }
    #btn-new-proj { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; padding: 2px 5px; border-radius: 4px; transition: color .15s, background .15s; }
    #btn-new-proj:hover { color: var(--accent); background: var(--accent-dim); }
    #projects-list { flex: 1; overflow-y: auto; padding: 6px; }
    #projects-list::-webkit-scrollbar { width: 4px; }
    #projects-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .proj-item { display: flex; align-items: center; gap: 7px; padding: 7px 8px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 0.77rem; font-weight: 600; transition: all .15s; user-select: none; }
    .proj-item:hover { background: var(--border); color: var(--text); }
    .proj-item.active { background: var(--accent-soft); color: var(--accent); }
    .proj-item .proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-item .proj-del { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; transition: opacity .15s, color .15s; flex-shrink: 0; }
    .proj-item:hover .proj-del { opacity: 1; }
    .proj-item .proj-del:hover { color: #f47067; }
    #proj-rename-input { flex: 1; background: var(--bg); border: 1px solid var(--accent); color: var(--text); font-family: var(--font-ui); font-size: 0.77rem; font-weight: 600; border-radius: 4px; padding: 1px 5px; outline: none; min-width: 0; }
    #btn-sidebar-toggle { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--font-ui); font-size: 0.78rem; font-weight: 600; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 5px; }
    #btn-sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #btn-sidebar-toggle.active { background: var(--accent-mid); border-color: var(--accent); color: var(--accent); }

    /* ── SIDEBAR (language tabs, vertical) ── */
    #sidebar {
      width: 52px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 4px;
    }
    .lang-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer;
      font-family: var(--font-code); font-size: 0.6rem; font-weight: 600;
      color: var(--muted); background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s; letter-spacing: 0.5px; text-transform: uppercase;
      position: relative; flex-direction: column; gap: 1px;
    }
    .lang-btn:hover { background: var(--border); color: var(--text); }
    .lang-btn.active { background: var(--accent-soft); color: var(--accent); }
    .lang-btn .dot {
      width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 4px;
      opacity: 0; transition: opacity .18s;
    }
    .lang-btn.active .dot { opacity: 1; }
    .lang-btn[data-lang="html"] .dot  { background: #f7895a; }
    .lang-btn[data-lang="css"] .dot   { background: #64b5f6; }
    .lang-btn[data-lang="js"] .dot    { background: var(--accent3); }
    .lang-btn[data-lang="md"] .dot    { background: var(--accent2); }

    .sidebar-sep { width: 28px; height: 1px; background: var(--border); margin: 6px 0; }

    /* ── EDITOR PANEL ── */
    #editor-panel {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }

    #editor-tabs {
      height: var(--tab-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; gap: 2px;
    }
    .etab {
      height: 28px; padding: 0 14px; border-radius: 5px; font-size: 0.75rem;
      font-family: var(--font-code); font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 7px; color: var(--muted);
      border: none; background: transparent; transition: all .15s;
    }
    .etab .etab-dot { width: 6px; height: 6px; border-radius: 50%; }
    .etab[data-lang="html"] .etab-dot  { background: #f7895a; }
    .etab[data-lang="css"] .etab-dot   { background: #64b5f6; }
    .etab[data-lang="js"] .etab-dot    { background: var(--accent3); }
    .etab[data-lang="md"] .etab-dot    { background: var(--accent2); }
    .etab.active { background: var(--bg); color: var(--text); }
    .etab:hover:not(.active) { background: var(--border); color: var(--text); }

    #monaco-container { flex: 1; position: relative; }

    /* ── RESIZER ── */
    #resizer {
      width: 5px; background: var(--border); cursor: col-resize;
      transition: background .15s; flex-shrink: 0; position: relative;
    }
    #resizer:hover, #resizer.dragging { background: var(--accent); }
    #resizer::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 2px; height: 32px; border-radius: 2px; background: inherit;
    }

    /* ── PREVIEW PANEL ── */
    /* ── TOGGLE VIEW BUTTONS ── */
    .btn-toggle {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font-ui); font-size: 0.78rem; font-weight: 600;
      padding: 6px 12px; border-radius: 6px; cursor: pointer; letter-spacing: 0.3px;
      transition: all .18s ease; display: flex; align-items: center; gap: 6px;
    }
    .btn-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn-toggle.active { background: var(--accent-mid); border-color: var(--accent); color: var(--accent); }
    .btn-toggle .tgl-icon { font-size: 0.85rem; transition: opacity .15s; }
    .btn-toggle.hidden-panel { color: var(--muted); border-style: dashed; }

    /* ── PREVIEW PANEL ── */
    #preview-panel {
      width: 45%; display: flex; flex-direction: column; min-width: 0;
      flex-shrink: 0; transition: width .25s ease;
    }
    /* Solo se oculta el contenido visual, no el panel entero */
    #preview-panel.preview-hidden #preview-topbar,
    #preview-panel.preview-hidden #preview-body { display: none; }
    /* Si preview oculto Y consola oculta → panel desaparece */
    #preview-panel.fully-hidden {
      width: 0 !important; overflow: hidden; pointer-events: none;
    }
    #resizer.panel-hidden { display: none; }

    #preview-topbar {
      height: var(--tab-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      flex-shrink: 0;
    }
    #preview-body {
      flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .preview-label { font-size: 0.73rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .traffic-lights { display: flex; gap: 5px; margin-right: 4px; }
    .tl { width: 10px; height: 10px; border-radius: 50%; }
    .tl.red    { background: #ff5f57; }
    .tl.yellow { background: #febc2e; }
    .tl.green  { background: #28c840; }

    #preview-body {
      flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    #preview-frame {
      flex: 1; border: none; background: #fff; min-height: 0;
    }

    /* ── MD PREVIEW — GitHub style ── */
    #md-preview {
      flex: 1; overflow-y: auto; min-height: 0;
      background: #0d1117;
      display: none;
      padding: 32px 40px 48px;
      box-sizing: border-box;
    }
    #md-preview::-webkit-scrollbar { width: 8px; }
    #md-preview::-webkit-scrollbar-track { background: var(--bg); }
    #md-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    #md-preview::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    /* inner wrapper for max-width like GitHub */
    #md-preview .gh-body {
      max-width: 740px; margin: 0 auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.6; color: #e6edf3;
    }

    /* headings */
    #md-preview h1,
    #md-preview h2,
    #md-preview h3,
    #md-preview h4,
    #md-preview h5,
    #md-preview h6 {
      margin-top: 24px; margin-bottom: 16px;
      font-weight: 600; line-height: 1.25; color: #e6edf3;
    }
    #md-preview h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid #30363d; }
    #md-preview h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid #30363d; }
    #md-preview h3 { font-size: 1.25em; }
    #md-preview h4 { font-size: 1em; }
    #md-preview h5 { font-size: .875em; }
    #md-preview h6 { font-size: .85em; color: #7d8590; }

    /* paragraph & inline */
    #md-preview p { margin-top: 0; margin-bottom: 16px; }
    #md-preview strong { font-weight: 600; color: #e6edf3; }
    #md-preview em { font-style: italic; }
    #md-preview del { text-decoration: line-through; color: #7d8590; }

    /* links */
    #md-preview a { color: #4493f8; text-decoration: none; }
    #md-preview a:hover { text-decoration: underline; }

    /* lists */
    #md-preview ul, #md-preview ol { margin-top: 0; margin-bottom: 16px; padding-left: 2em; }
    #md-preview li { margin-top: 4px; }
    #md-preview li + li { margin-top: 4px; }
    #md-preview li > p { margin-top: 16px; }

    /* task lists */
    #md-preview input[type="checkbox"] { margin-right: 6px; }

    /* blockquote */
    #md-preview blockquote {
      margin: 0 0 16px; padding: 0 1em;
      color: #7d8590; border-left: 4px solid #3d444d;
    }
    #md-preview blockquote > :first-child { margin-top: 0; }
    #md-preview blockquote > :last-child  { margin-bottom: 0; }

    /* ── GitHub Alerts ── */
    .gh-alert {
      padding: 12px 16px; margin: 0 0 16px;
      border-radius: 6px; border-left: 4px solid;
      display: flex; flex-direction: column; gap: 6px;
    }
    .gh-alert-title {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 0.875em; letter-spacing: 0.02em;
    }
    .gh-alert p { margin: 0; font-size: 0.9em; line-height: 1.6; }
    .gh-alert p:last-child { margin-bottom: 0; }

    .gh-alert.note    { background: rgba(31,111,235,.1);  border-color: #1f6feb; }
    .gh-alert.tip     { background: rgba(35,134,54,.1);   border-color: #238636; }
    .gh-alert.warning { background: rgba(154,103,0,.1);   border-color: #9a6700; }
    .gh-alert.important { background: rgba(130,80,223,.1);border-color: #8250df; }
    .gh-alert.caution { background: rgba(218,54,51,.1);   border-color: #da3633; }

    .gh-alert.note     .gh-alert-title { color: #58a6ff; }
    .gh-alert.tip      .gh-alert-title { color: #3fb950; }
    .gh-alert.warning  .gh-alert-title { color: #d29922; }
    .gh-alert.important .gh-alert-title { color: #a371f7; }
    .gh-alert.caution  .gh-alert-title { color: #f85149; }

    .gh-alert .gh-alert-body { color: #e6edf3; }

    /* code inline */
    #md-preview code {
      padding: .2em .4em; margin: 0;
      font-size: 85%; font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      background: rgba(110,118,129,.4); border-radius: 6px; color: #e6edf3;
    }

    /* code block */
    #md-preview pre {
      margin-bottom: 16px; padding: 16px; overflow: auto;
      font-size: 85%; line-height: 1.45;
      background: #161b22; border-radius: 6px; border: 1px solid #30363d;
    }
    #md-preview pre code {
      padding: 0; background: transparent; border-radius: 0;
      font-size: 100%; color: #e6edf3; white-space: pre;
    }

    /* hr */
    #md-preview hr {
      height: 4px; padding: 0; margin: 24px 0;
      background: #30363d; border: none; border-radius: 2px;
    }

    /* tables */
    #md-preview table {
      border-collapse: collapse; width: 100%; margin-bottom: 16px;

      } else {
        // expression — eval with __S vars in scope
        result = keys.length ? new Function(...keys,'return ('+expr+')')(...vals) : (0,eval)(expr);
      }

      let text;
      if (result === undefined)            text = 'undefined';
      else if (result === null)            text = 'null';
      else if (typeof result==='function') text = '[Function: '+(result.name||'anonymous')+']';
      else if (typeof result==='object')   { try{text=JSON.stringify(result,null,2)}catch(_){text=String(result)} }
      else                                 text = String(result);
      window.parent.postMessage({ type:'cf-repl-result', ok:true, text, silent, time:Date.now() }, '*');
    } catch(err) {
      window.parent.postMessage({ type:'cf-repl-result', ok:false, text:err.message, silent, time:Date.now() }, '*');
    }
  });
})();
<\/script>`;

const VERBOSE_INTERCEPTOR = `
<script>
(function(){
  const _tracked = new Set(['undefined','NaN','Infinity','location','document','window','navigator','history','performance','console','JSON','Math','Date','Promise','Array','Object','String','Number','Boolean','Symbol','Error','RegExp','Function','globalThis','self','top','parent','frames','opener','closed','defaultStatus','status','name','length','origin','isSecureContext','crossOriginIsolated','isFinite','isNaN','parseFloat','parseInt','decodeURI','decodeURIComponent','encodeURI','encodeURIComponent','escape','unescape','eval','alert','confirm','prompt','queueMicrotask','requestAnimationFrame','cancelAnimationFrame','setTimeout','clearTimeout','setInterval','clearInterval','requestIdleCallback','cancelIdleCallback','btoa','atob','fetch','XMLHttpRequest','WebSocket','Worker','SharedWorker','Blob','File','FileReader','URL','URLSearchParams','FormData','Headers','Request','Response','Event','CustomEvent','EventTarget','AbortController','AbortSignal','crypto','caches','indexedDB','localStorage','sessionStorage','postMessage','addEventListener','removeEventListener','dispatchEvent','getComputedStyle','matchMedia','screen','devicePixelRatio','innerWidth','innerHeight','outerWidth','outerHeight','scrollX','scrollY','pageXOffset','pageYOffset','screenX','screenY','frameElement','onload','onunload','onerror','onresize','onscroll']);
  const _handler = {
    set(target, prop, value) {

function renderPreview() {

  const html = models.html?.getValue() || '';
  const css  = models.css?.getValue()  || '';
  const js   = models.js?.getValue()   || '';
  const scrollbarBlock = `<style>${getScrollbarCSS()}</style>`;
  const verboseBlock   = devtoolsMode ? VERBOSE_INTERCEPTOR : '';
  let injected = html
    .replace('<head>', `<head>\n${CONSOLE_INTERCEPTOR}${verboseBlock}`)
    .replace('</head>', `${scrollbarBlock}<style>${css}</style></head>`)
    .replace('</body>', `<script>${js}<\/script></body>`);
  if (!html.includes('<head>')) injected = CONSOLE_INTERCEPTOR + verboseBlock + scrollbarBlock + injected;
  clearConsole(true);
  document.getElementById('preview-frame').srcdoc = injected;
  addConsoleLine('system', '▶ Preview actualizado');
}

function renderMd() {
  if (typeof marked === 'undefined') return;
  const raw = models.md?.getValue() || '';
  const html = marked.parse(raw);
  document.getElementById('md-preview').innerHTML = `<div class="gh-body">${processAlerts(html)}</div>`;

// Convierte blockquotes con [!TYPE] en GitHub Alerts estilizados
function processAlerts(html) {
  const ALERTS = {
    'NOTE':      { icon: 'ℹ️', label: 'Note' },
    'TIP':       { icon: '💡', label: 'Tip' },
    'WARNING':   { icon: '⚠️', label: 'Warning' },
    'IMPORTANT': { icon: '❗', label: 'Important' },
    'CAUTION':   { icon: '🛑', label: 'Caution' },
  };
  // Marked convierte > [!NOTE] en <blockquote><p>[!NOTE]</p>...</blockquote>
  return html.replace(
    /<blockquote>\s*<p>\[!(NOTE|TIP|WARNING|IMPORTANT|CAUTION)\]([\s\S]*?)<\/blockquote>/gi,
    (_, type, rest) => {
      const t = type.toUpperCase();
      const { icon, label } = ALERTS[t] || { icon: 'ℹ️', label: type };
      // Limpia el texto restante (quita el primer </p> sobrante del tipo)
      const body = rest.replace(/^\s*<\/p>/, '').trim();
      return `<div class="gh-alert ${t.toLowerCase()}">
        <div class="gh-alert-title">${icon} ${label}</div>
        <div class="gh-alert-body">${body || ''}</div>
      </div>`;
    }
  );
}

const ICONS = { log:'›', info:'ℹ', warn:'⚠', error:'✖', system:'·', verbose:'≫', 'repl-in':'›', 'repl-out':'←', 'repl-err':'✖' };
let consoleCount = 0, errorCount = 0;

function addConsoleLine(method, text) {
  const output = document.getElementById('console-output');
  const empty  = document.getElementById('console-empty');
  if (empty) empty.remove();
  const now  = new Date();
  const time = now.toLocaleTimeString('es', { hour12:false }) + '.' + String(now.getMilliseconds()).padStart(3,'0');
  const line = document.createElement('div');
  line.className = `cline ${method}`;
  line.innerHTML = `<span class="cline-icon ${method}">${ICONS[method]||'›'}</span><span class="cline-text">${escHtml(text)}</span><span class="cline-time">${time}</span>`;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
  if (method !== 'system') {
    consoleCount++;
    if (method === 'error') errorCount++;
    updateBadge();
  }
  const panel = document.getElementById('console-panel');
  if (method === 'error' && panel.classList.contains('collapsed')) panel.classList.remove('collapsed');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearConsole(silent) {
  const output = document.getElementById('console-output');
  output.innerHTML = '';
  if (!silent) {
    const empty = document.createElement('div');
    empty.id = 'console-empty';
    empty.innerHTML = `<span class="ce-icon">⬡</span><span>Consola limpia</span>`;
    output.appendChild(empty);
  }
  consoleCount = 0; errorCount = 0;
  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('console-badge');

const HTML_VOID = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);

const HTML_BOILERPLATE = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
</body>
</html>`;

function expandHtmlAbbr(abbr) {
  if (abbr === '!') return HTML_BOILERPLATE;
  function parseNode(str) {
    let inner = '';
    str = str.replace(/\{([^}]*)\}/, (_, t) => { inner = t; return ''; });
    let repeat = 1;
    str = str.replace(/\*(\d+)$/, (_, n) => { repeat = parseInt(n); return ''; });
    const attrs = {};
    str = str.replace(/\[([^\]]*)\]/g, (_, a) => {
      a.split(/\s+/).forEach(pair => {
        const [k, v] = pair.split('=');
        if (k) attrs[k] = v ? v.replace(/^["']|["']$/g, '') : '';
      });
      return '';
    });
    str = str.replace(/#([\w-]+)/g, (_, id) => { attrs.id = id; return ''; });
    const classes = [];
    str = str.replace(/\.([\w-]+)/g, (_, c) => { classes.push(c); return ''; });
    if (classes.length) attrs.class = classes.join(' ');
    const tag = str || 'div';
    return { tag, attrs, inner, repeat };
  }
  function buildTag(tag, attrs, inner, childrenHtml) {
    const attrStr = Object.entries(attrs).map(([k,v]) => v==='' ? ` ${k}` : ` ${k}="${v}"`).join('');
    const content = inner || childrenHtml || '';
    if (HTML_VOID.has(tag)) return `<${tag}${attrStr}>`;
    if (!content) return `<${tag}${attrStr}></${tag}>`;
    if (content.includes('\n')) {
      const indented = content.split('\n').map(l => '  '+l).join('\n');
      return `<${tag}${attrStr}>\n${indented}\n</${tag}>`;
    }
    return `<${tag}${attrStr}>${content}</${tag}>`;
  }
  function expand(expr) {
    const siblings = [];
    let depth = 0, cur = '';
    for (const ch of expr) {
      if (ch==='(') depth++;
      else if (ch===')') depth--;
      else if (ch==='+' && depth===0) { siblings.push(cur); cur=''; continue; }
      cur += ch;
    }
    siblings.push(cur);
    return siblings.map(seg => {
      const gtIdx = seg.indexOf('>');
      const nodeStr   = gtIdx === -1 ? seg : seg.slice(0, gtIdx);
      const childExpr = gtIdx === -1 ? '' : seg.slice(gtIdx+1);
      const { tag, attrs, inner, repeat } = parseNode(nodeStr);
      const childHtml = childExpr ? expand(childExpr) : '';
      const single = buildTag(tag, attrs, inner, childHtml);
      return Array.from({ length: repeat }, (_,i) =>
        repeat > 1 ? single.replace(/\$\$/g, String(i+1).padStart(2,'0')).replace(/\$/g, String(i+1)) : single
      ).join('\n');
    }).join('\n');
  }
  try { return expand(abbr); } catch(e) { return null; }
}

};

function expandCssAbbr(abbr) {
  if (CSS_SNIPPETS[abbr]) return CSS_SNIPPETS[abbr];
  const match = abbr.match(/^([a-z]+)(-?[\d.]+)(px|em|rem|%|vh|vw|vmin|vmax|s|ms)?$/);
  if (match) {
    const [, prefix, num, unit] = match;
    const prop = CSS_SNIPPETS[prefix];
    if (prop) {
      const u = unit || (parseFloat(num) === 0 ? '' : 'px');
      return prop.replace(/: ;$/, `: ${num}${u};`);
    }
  }
  return null;
}

// El REPL evalúa en el iframe para tener acceso al scope del usuario
const replInput   = document.getElementById('repl-input');
const replHistory = [];
let replHistIdx   = -1;

function replEval(expr) {
  expr = expr.trim();
  if (!expr) return;
  const frame = document.getElementById('preview-frame');
  if (!frame || !frame.contentWindow) {
    addConsoleLine('repl-err', '✖ Preview no disponible — ejecuta el código primero');
    return;
  }
  frame.contentWindow.postMessage({ type: 'cf-repl', expr }, '*');
}

replInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const expr = replInput.value.trim();
    if (!expr) return;
    replHistory.unshift(expr);
    if (replHistory.length > 100) replHistory.pop();
    replHistIdx = -1;
    addConsoleLine('repl-in', expr);
    replInput.value = '';
    replEval(expr);
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (replHistIdx < replHistory.length - 1) { replHistIdx++; replInput.value = replHistory[replHistIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (replHistIdx > 0) { replHistIdx--; replInput.value = replHistory[replHistIdx]; }
    else { replHistIdx = -1; replInput.value = ''; }
  }
});

const PROJ_KEY='g4lcode_projects', ACTIVE_KEY='g4lcode_active';

if(!projects.find(p=>p.id===activeProjectId)) activeProjectId=projects[0].id;

function getActiveProject(){return projects.find(p=>p.id===activeProjectId)||projects[0];}
function saveCurrentFilesToProject(){
  const p=getActiveProject(); if(!p||!models.html) return;
  p.files={html:models.html.getValue(),css:models.css.getValue(),js:models.js.getValue(),md:models.md.getValue()};

  const p=getActiveProject();
  Object.entries(p.files).forEach(([lang,code])=>models[lang]?.setValue(code));
  renderPreview(); renderProjectsList(); showToast('Proyecto: '+p.name);

function renderProjectsList(){
  const list=document.getElementById('projects-list'); list.innerHTML='';
  projects.forEach(p=>{
    const item=document.createElement('div');
    item.className='proj-item'+(p.id===activeProjectId?' active':'');
    item.innerHTML=`<span class="proj-name" title="${p.name}">${p.name}</span><button class="proj-del" title="Eliminar">✕</button>`;
    item.addEventListener('click',ev=>{if(!ev.target.classList.contains('proj-del')&&p.id!==activeProjectId)loadProject(p.id);});
    item.querySelector('.proj-name').addEventListener('dblclick',ev=>{
      ev.stopPropagation();
      const span=item.querySelector('.proj-name');
      const inp=document.createElement('input'); inp.id='proj-rename-input'; inp.value=p.name;
      span.replaceWith(inp); inp.focus(); inp.select();
      const commit=()=>{p.name=inp.value.trim()||p.name;LS.set(PROJ_KEY,projects);renderProjectsList();};
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){inp.value=p.name;inp.blur();}});
    });
    item.querySelector('.proj-del').addEventListener('click',ev=>{
      ev.stopPropagation();
      if(projects.length===1){showToast('No puedes eliminar el único proyecto');return;}

      if(activeProjectId===p.id)loadProject(projects[0].id); else renderProjectsList();
    });
    list.appendChild(item);
  });

let previewVisible = true;

function updatePanelVisibility() {
  const previewPanel  = document.getElementById('preview-panel');
  const previewTopbar = document.getElementById('preview-topbar');
  const previewBody   = document.getElementById('preview-body');
  const consolePanel  = document.getElementById('console-panel');
  const consoleResizer= document.getElementById('console-resizer');
  const resizerEl     = document.getElementById('resizer');
  const btnPrev       = document.getElementById('btn-toggle-preview');
  const btnCons       = document.getElementById('btn-toggle-console');
  const bothHidden    = !previewVisible && !consoleVisible;

  previewTopbar.style.display = previewVisible ? '' : 'none';
  previewBody.style.display   = previewVisible ? '' : 'none';

  if (!consoleVisible) {
    consolePanel.classList.add('force-hidden');
    consoleResizer.classList.add('hidden');
  } else {
    consolePanel.classList.remove('force-hidden');
    consoleResizer.classList.remove('hidden');
  }

  if (!previewVisible && consoleVisible) {
    consolePanel.classList.add('console-expand');
  } else {
    consolePanel.classList.remove('console-expand');
  }

  if (bothHidden) {
    previewPanel.classList.add('fully-hidden');
    resizerEl.classList.add('panel-hidden');
  } else {
    previewPanel.classList.remove('fully-hidden');
    resizerEl.classList.remove('panel-hidden');
  }

  btnPrev.classList.toggle('active', previewVisible);
  btnPrev.classList.toggle('hidden-panel', !previewVisible);
  btnCons.classList.toggle('active', consoleVisible);
  btnCons.classList.toggle('hidden-panel', !consoleVisible);

  if (editor) editor.layout();
}

function applyUIColors(theme) {
  const c = THEME_UI_COLORS[theme] || THEME_UI_COLORS['codeflow'];
  const r = document.documentElement;
  r.style.setProperty('--bg',        c.bg);
  r.style.setProperty('--surface',   c.surface);
  r.style.setProperty('--border',    c.border);
  r.style.setProperty('--accent',    c.accent);
  r.style.setProperty('--accent2',   c.accent2);
  r.style.setProperty('--accent3',   c.accent3);
  r.style.setProperty('--accent4',   c.accent4);
  r.style.setProperty('--text',      c.text);
  r.style.setProperty('--muted',     c.muted);
  r.style.setProperty('--console-bg',c.consoleBg);
  r.style.setProperty('--statusbar-bg', c.sbBg);
  r.style.setProperty('--statusbar-fg', c.sbFg);
  const dimC = c.accent.replace('#','');
  r.style.setProperty('--accent-dim',  `rgba(${hexToRgb(dimC)},.09)`);
  r.style.setProperty('--accent-mid',  `rgba(${hexToRgb(dimC)},.17)`);
  r.style.setProperty('--accent-soft', `rgba(${hexToRgb(dimC)},.22)`);
}
function hexToRgb(hex) {
  const n = parseInt(hex, 16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

async function initShiki(targetTheme) {
  if (shikiLoading) { pendingTheme = targetTheme; return; }
  shikiLoading = true;
  if (!shikiReady) showToast('Cargando tema...');
  try {
    const { createHighlighter } = await import('shiki');
    const { shikiToMonaco }     = await import('@shikijs/monaco');
    const shikiThemeNames = Object.values(SHIKI_NAME_MAP);
    const highlighter = await createHighlighter({
      themes: [CODEFLOW_SHIKI_THEME, ...shikiThemeNames],
      langs:  ['html','css','javascript','markdown'],
    });
    shikiToMonaco(highlighter, monaco);
    shikiReady = true;
    const shikiName = SHIKI_NAME_MAP[targetTheme] || targetTheme;
    monaco.editor.setTheme(shikiName);
    showToast('Tema aplicado');
  } catch(e) {
    console.warn('Shiki failed, using Monaco fallback', e);
  }
  shikiLoading = false;
  if (pendingTheme) { const t = pendingTheme; pendingTheme = null; await applyTheme(t); }
}

async function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  LS.set('g4lcode_theme', theme);
  applyUIColors(theme);
  if (shikiReady) {
    const shikiName = SHIKI_NAME_MAP[theme] || theme;
    monaco.editor.setTheme(shikiName);
  } else {
    await initShiki(theme);
  }
  renderPreview();
}

document.getElementById('theme-select').addEventListener('change', async function() {
  await applyTheme(this.value);

  });

  // Init projects list
  renderProjectsList();

  // ── Cargar Shiki con el tema guardado ─────────────────────────
  initShiki(_savedTheme);

  // ── Emmet Tab ─────────────────────────────────────────────
  editor.onKeyDown(e => {
    if (e.keyCode !== monaco.KeyCode.Tab) return;
    if (e.shiftKey || e.ctrlKey || e.altKey || e.metaKey) return;
    const model = editor.getModel();
    const pos   = editor.getPosition();
    const lang  = model.getLanguageId();
    if (!['html','css','scss','less','markdown'].includes(lang)) return;
    const textBefore = model.getLineContent(pos.lineNumber).substring(0, pos.column - 1);
    const abbrMatch  = textBefore.match(/[\w.#>\[\]*+{}$@!:-]+$/);
    if (!abbrMatch) return;
    const abbr = abbrMatch[0];
    const expanded = lang === 'html' || lang === 'markdown'
      ? expandHtmlAbbr(abbr)
      : expandCssAbbr(abbr);
    if (!expanded) return;
    e.preventDefault();
    e.stopPropagation();
    const startCol = pos.column - abbr.length;
    editor.executeEdits('emmet', [{
      range: new monaco.Range(pos.lineNumber, startCol, pos.lineNumber, pos.column),
      text: expanded,
    }]);
    requestAnimationFrame(() => {
      if (lang === 'css' || lang === 'scss' || lang === 'less') {
        const colonIdx = expanded.indexOf(': ');
        if (colonIdx !== -1) editor.setPosition({ lineNumber: pos.lineNumber, column: startCol + colonIdx + 2 });
      } else {
        const firstClose = expanded.indexOf('>');
        const baseTag = abbr.replace(/[.#\[{>*+].*/,'');
        if (firstClose !== -1 && !HTML_VOID.has(baseTag)) {
          editor.setPosition({ lineNumber: pos.lineNumber, column: startCol + firstClose + 1 });
        }
      }
      editor.focus();
    });
  });

  // ── Emmet Completion Providers ────────────────────────────
  const HTML_TAGS = ['a','abbr','address','article','aside','audio','b','blockquote',
    'button','canvas','code','col','datalist','dd','details','dialog','div','dl','dt',
    'em','embed','fieldset','figcaption','figure','footer','form','h1','h2','h3','h4',

    'style','sub','summary','sup','table','tbody','td','template','textarea','tfoot',
    'th','thead','time','title','tr','ul','video'];

  const HTML_FIXED = [
    { label:'html:5',    detail:'Documento HTML5 completo', insert:'<!DOCTYPE html>\n<html lang="es">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>' },

    { label:'form',      detail:'<form action method>',     insert:'<form action="" method="post">\n  \n</form>' },
    { label:'select',    detail:'<select><option>',         insert:'<select>\n  <option value=""></option>\n</select>' },
    { label:'link:css',  detail:'<link rel="stylesheet">',  insert:'<link rel="stylesheet" href="style.css">' },
    { label:'script:src',detail:'<script src="">',          insert:'<script src=""><\/script>' },
    { label:'meta:vp',   detail:'meta viewport',            insert:'<meta name="viewport" content="width=device-width, initial-scale=1.0">' },
    { label:'inp',       detail:'<input type="text">',      insert:'<input type="text" name="" id="">' },
    { label:'btn',       detail:'<button type="button">',   insert:'<button type="button"></button>' },
    { label:'img',       detail:'<img src="" alt="">',      insert:'<img src="" alt="">' },
    { label:'a',         detail:'<a href="">',              insert:'<a href=""></a>' },
    { label:'video',     detail:'<video controls>',         insert:'<video controls>\n  <source src="" type="video/mp4">\n</video>' },
  ];

  monaco.languages.registerCompletionItemProvider('html', {
    triggerCharacters: ['.','#','>','*','[','!'],
    provideCompletionItems(model, position) {
      const line       = model.getLineContent(position.lineNumber);
      const textBefore = line.substring(0, position.column - 1);
      const abbrMatch  = textBefore.match(/[\w.#>\[\]*+!:-]+$/);
      const abbr       = abbrMatch ? abbrMatch[0] : '';
      const wordMatch  = textBefore.match(/\w+$/);
      const word       = wordMatch ? wordMatch[0] : '';

      const mkRange = (len) => ({
        startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: position.column - len, endColumn: position.column,
      });

      const suggestions = [];

      // ! → boilerplate HTML5
      if (abbr === '!') {
        suggestions.push({
          label: '!',
          kind: monaco.languages.CompletionItemKind.Snippet,
          detail: 'Estructura HTML5 completa',
          documentation: { value: `**Emmet**\n\`\`\`html\n${HTML_BOILERPLATE}\n\`\`\`` },
          insertText: HTML_BOILERPLATE,
          range: mkRange(1),
          sortText: '00',
        });
        return { suggestions };
      }

      // Snippets fijos
      HTML_FIXED.forEach(s => {
        if (!word || s.label.startsWith(word) || s.label.includes(word)) {
          suggestions.push({
            label: s.label,
            kind: monaco.languages.CompletionItemKind.Snippet,
            detail: s.detail,
            documentation: { value: `**Emmet**\n\`\`\`html\n${s.insert}\n\`\`\`` },
            insertText: s.insert,
            range: mkRange(abbr.length),
            sortText: '0' + s.label,
          });
        }
      });

      // Etiquetas simples
      if (word) {
        HTML_TAGS.forEach(tag => {
          if (tag.startsWith(word) && !HTML_FIXED.find(s => s.label === tag)) {
            const exp = expandHtmlAbbr(tag) || `<${tag}></${tag}>`;
            suggestions.push({
              label: tag,
              kind: monaco.languages.CompletionItemKind.Snippet,
              detail: exp,
              documentation: { value: `**Emmet**\n\`\`\`html\n${exp}\n\`\`\`` },
              insertText: exp,
              range: mkRange(word.length),
              sortText: '1' + tag,
            });
          }
        });
      }

      // Abreviatura compleja con operadores
      if (abbr && /[.#>*\[\]]/.test(abbr)) {
        const expanded = expandHtmlAbbr(abbr);
        if (expanded) {
          suggestions.unshift({
            label: abbr + ' ⚡',
            kind: monaco.languages.CompletionItemKind.Snippet,
            detail: 'Expandir con Emmet',
            documentation: { value: `**Emmet**\n\`\`\`html\n${expanded}\n\`\`\`` },
            insertText: expanded,
            range: mkRange(abbr.length),
            sortText: '00',
          });
        }
      }

      return { suggestions };
    }
  });

  const CSS_SNIPPETS_LIST = Object.entries(CSS_SNIPPETS).map(([abbr, val]) => ({ abbr, val }));
  const CSS_NUM_PREFIXES  = new Set(['m','mt','mr','mb','ml','mx','my','p','pt','pr','pb','pl','px','py','w','h','fs','lh','br','op','zi','gg','bdrs']);

  monaco.languages.registerCompletionItemProvider('css', {
    triggerCharacters: [':','-'],
    provideCompletionItems(model, position) {
      const line       = model.getLineContent(position.lineNumber);
      const textBefore = line.substring(0, position.column - 1);
      const abbrMatch  = textBefore.match(/[\w-]+$/);
      const abbr       = abbrMatch ? abbrMatch[0] : '';

      const range = {
        startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: position.column - abbr.length, endColumn: position.column,
      };

      const suggestions = [];
      CSS_SNIPPETS_LIST.forEach(({ abbr: a, val }) => {
        if (!abbr || a.startsWith(abbr)) {
          suggestions.push({
            label: a,
            kind: monaco.languages.CompletionItemKind.Snippet,
            detail: val,
            documentation: { value: `**Emmet CSS**\n\`\`\`css\n${val}\n\`\`\`` },
            insertText: val,
            range,
            sortText: '0' + a,
          });
        }
      });

      // Variantes con número
      if (abbr && CSS_NUM_PREFIXES.has(abbr)) {
        [2,4,8,10,12,16,20,24,32,48,64,100].forEach(n => {
          const key = abbr + n;
          const exp = expandCssAbbr(key);
          if (exp) {
            suggestions.push({
              label: key,
              kind: monaco.languages.CompletionItemKind.Snippet,
              detail: exp,
              documentation: { value: `**Emmet CSS**\n\`\`\`css\n${exp}\n\`\`\`` },
              insertText: exp,
              range,
              sortText: '1' + n.toString().padStart(4,'0'),
            });
          }
        });
      }

      return { suggestions };
    }
  });

  // ── Initial render ────────────────────────────────────────
  renderPreview();
  updateStatusLang();
});
</script>
</body>
</html>
